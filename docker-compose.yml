services:
  db:
    image: postgres:16-alpine
    container_name: buzzpay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: buzzpay
      POSTGRES_PASSWORD: buzzpay_dev_2026
      POSTGRES_DB: buzzpay
    ports:
      - "5432:5432"
    volumes:
      - buzzpay_data:/var/lib/postgresql/data

volumes:
  buzzpay_data:
